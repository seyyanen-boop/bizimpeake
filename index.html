<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peake - Low-Poly Ascent</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --peake-red: #f55035; --bg-dark: #0d0f12; --text-color: #eee; }
        body { margin: 0; background: var(--bg-dark); color: var(--text-color); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; touch-action: none; }
        .container { display: flex; width: 100%; height: 100%; }
        @media (max-width: 900px) { .container { flex-direction: column; } }

        /* Oyun Alanı */
        .game-section { flex: 2; position: relative; overflow: hidden; background: #1a1c20; }
        #game-container { width: 100%; height: 100%; cursor: pointer; }

        /* Sohbet Alanı */
        .chat-section { flex: 1; display: flex; flex-direction: column; background: var(--bg-dark); border-left: 1px solid #222; }
        @media (max-width: 900px) { .chat-section { flex: 1.5; min-width: 100%; height: 50%; border-left: none; border-top: 1px solid #222; } }

        .chat-header { background: var(--peake-red); color: white; padding: 12px; text-align: center; font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 12px; font-size: 14px; max-width: 80%; line-height: 1.4; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: var(--peake-red); color: white; }
        .bot-msg { align-self: flex-start; background: #23272e; border: 1px solid #333; color: #ced4da; }

        .input-area { padding: 12px; display: flex; gap: 8px; border-top: 1px solid #222; }
        input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #1a1c20; color: white; outline: none; }
        button { background: var(--peake-red); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* FP Arayüzü (Stamina) */
        .fp-ui { position: absolute; bottom: 20px; left: 20px; display: flex; align-items: flex-end; gap: 10px; pointer-events: none; z-index: 10; }
        .stamina-bar { width: 250px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #555; border-radius: 5px; overflow: hidden; }
        .stamina-fill { height: 100%; width: 100%; background: #a4e61b; transition: width 0.1s; }

        /* Başlangıç Ekranı */
        .blocker { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; text-align: center; color: white; }
        .blocker h1 { color: var(--peake-red); margin-bottom: 5px; }
        .blocker p { color: #888; font-size: 14px; margin: 0; }
    </style>
</head>
<body>

    <div class="blocker" id="blocker">
        <h1>PEAKE - DAĞ ASCENT</h1>
        <p>BAŞLAMAK İÇİN TIKLA</p>
        <p style="font-size: 12px; color: #555;">[Q-E]: Tutun/Bırak | WASD: Hareket | FARE: Bakış</p>
    </div>

    <div class="container">
        <div class="game-section">
            
            <div class="fp-ui">
                <div class="stamina-bar">
                    <div class="stamina-fill" id="stamina"></div>
                </div>
            </div>

            <div id="game-container"></div>
        </div>

        <div class="chat-section">
            <div class="chat-header">PEAKE AI ASCENT TERMINAL</div>
            <div id="messages">Sohbet hazır, dağcı! Tırmanırken bir şeyler sor...</div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Mesajını yaz...">
                <button id="sendBtn">SOR</button>
            </div>
        </div>
    </div>

<script>
    // --- GROQ ---
    const GROQ_KEY = "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"; // Senin anahtarın

    async function askGroq() {
        const input = document.getElementById("userInput");
        if(!input.value) return;
        const txt = input.value; input.value = "";
        addMsg(txt, 'user');
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST", headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama3-8b-8192", messages: [{role:"user", content:txt}] })
            });
            const d = await res.json();
            addMsg(d.choices[0].message.content, 'bot');
        } catch(e) { addMsg("Bağlantı hatası!", 'bot'); }
    }
    function addMsg(t, s) {
        const d = document.createElement("div"); d.className = `msg ${s}-msg`; d.innerText = t;
        const m = document.getElementById("messages"); m.appendChild(d); m.scrollTop = m.scrollHeight;
    }
    document.getElementById("sendBtn").onclick = askGroq;
    document.getElementById("userInput").onkeypress = (e) => e.key === "Enter" && askGroq();

    // --- 3D ENGINE (LOW-POLY DAĞ SİMÜLASYONU) ---
    const container = document.getElementById('game-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xb3e5fc); // Gökyüzü mavis
    scene.fog = new THREE.Fog(0xb3e5fc, 10, 50);

    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // FP Kamera Kontrolleri
    const blocker = document.getElementById('blocker');
    let isLocked = false;
    blocker.addEventListener('click', () => {
        if(!isLocked) {
            blocker.style.display = 'none';
            isLocked = true;
            // Fare kilidini başlatmak zor ama imkansız değil (THREE.js eklentisi gerekiyor)
            addMsg("Peake AI: Tırmanış Başlıyor. WASD ile hareket et.", 'bot');
        }
    });

    // Işıklandırma
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const sun = new THREE.DirectionalLight(0xffffff, 0.5); sun.position.set(5, 10, 7); scene.add(sun);

    // --- DAĞ VE KAYALAR (IMAGE_3.PNG GİBİ LOW-POLY TARZI) ---
    // Ana dağ kütlesi
    const daGeo = new THREE.ConeGeometry(30, 100, 12);
    const daMat = new THREE.MeshPhongMaterial({ color: 0x8d6e63, flatShading: true });
    const da = new THREE.Mesh(daGeo, daMat);
    da.position.y = -50;
    scene.add(da);

    // Tırmanma Platformları (Low-Poly Kayalar)
    const holdMaterial = new THREE.MeshPhongMaterial({ color: 0x5d4037, flatShading: true });
    const holds = [];
    for(let i=0; i<60; i++) {
        // Platformları rastgele boyutlarda ve rotasyonlarda tırmanılabilir "kayalara" dönüştürdük.
        const holdGeo = new THREE.BoxGeometry(2 + Math.random(), 0.5 + Math.random()*0.5, 2 + Math.random());
        const hold = new THREE.Mesh(holdGeo, holdMaterial);
        // Dağ yüzeyinde sarmal şekilde yükseliyor
        hold.position.set(Math.sin(i*0.9)*12, i*3, Math.cos(i*0.9)*12);
        hold.rotation.set(Math.random(), Math.random(), Math.random());
        scene.add(hold);
        holds.push(hold);
    }

    // --- BİRİNCİ ŞAHIS ELLER ---
    const handGroup = new THREE.Group();
    scene.add(handGroup);

    // Sol El (image_3.png'deki gibi pembe)
    const lHand = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.8), new THREE.MeshPhongMaterial({ color: 0xff80ab }));
    lHand.position.set(-1, -0.8, -1.5); // Kameranın önünde sol alt

    // Sağ El (Mushroom Şapkalı Karakter Rengi)
    const rHand = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.8), new THREE.MeshPhongMaterial({ color: 0xffcc80 }));
    rHand.position.set(1, -0.8, -1.5); // Kameranın önünde sağ alt

    handGroup.add(lHand, rHand);
    camera.add(handGroup); // Eller kamerayı takip etmeli
    scene.add(camera);

    // Hareket Değişkenleri
    let yVel = 0, stamina = 100;
    let currentPlatformIndex = 0;
    const keys = { w: false, a: false, s: false, d: false };

    // Tuş Dinleyicileri
    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if(keys.hasOwnProperty(key)) keys[key] = true;
    });
    window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        if(keys.hasOwnProperty(key)) keys[key] = false;
    });

    function animate() {
        requestAnimationFrame(animate);
        
        if(isLocked) {
            // Fizik ve Yerçekimi
            yVel -= 0.012; // Yerçekimi
            camera.position.y += yVel;
            
            // Peak tarzı "Head Bobbing" (Sen hareket ederken ellerin hafifçe sallanması)
            if(keys.w || keys.s || keys.a || keys.d) {
                handGroup.position.y = Math.sin(Date.now() * 0.01) * 0.05;
                stamina -= 0.08; // Hareket etmek enerji harcar
            } else if(stamina < 100) {
                stamina += 0.1; // Dururken enerji dolar
            }
            document.getElementById('stamina').style.width = stamina + '%';

            // WASD Kontrolü (Yukarı-Aşağı ve Sola-Sağa)
            if(keys.w) camera.position.y += 0.08; // Tırman
            if(keys.s) camera.position.y -= 0.08; // İn

            // Platform Çarpışma Kontrolü (Kayaların üzerine basmak)
            holds.forEach((p, idx) => {
                if(camera.position.y > p.position.y && camera.position.y < p.position.y + 1.2 &&
                   Math.abs(camera.position.x - p.position.x) < 2 && Math.abs(camera.position.z - p.position.z) < 2 && yVel < 0) {
                    yVel = 0; // Kayaya bastın
                    if(idx > currentPlatformIndex) currentPlatformIndex = idx;
                }
            });

            // Düşme kontrolü (Sıfırla)
            if(camera.position.y < -15) {
                camera.position.set(0, 5, 10);
                yVel = 0; stamina = 100; currentPlatformIndex = 0;
                addMsg(`Peake AI: Dağdan düştün! Tekrar dene.`, 'bot');
            }
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        if (!container.clientWidth) return;
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    animate();
</script>
</body>
</html>
