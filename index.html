<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peake Ultimate 3D - Two Hands FP Ascent</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <style>
        :root { --peake-red: #f55035; --bg-dark: #0a0c0f; --text-color: #eee; }
        body { margin: 0; background: var(--bg-dark); color: var(--text-color); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; touch-action: none; }
        .container { display: flex; width: 100%; height: 100%; }
        @media (max-width: 900px) { .container { flex-direction: column; } }

        /* Oyun Bölümü */
        .game-section { flex: 2; position: relative; overflow: hidden; background: #1a1c20; }
        #game-container { width: 100%; height: 100%; cursor: pointer; }

        /* Sohbet Bölümü */
        .chat-section { flex: 1; display: flex; flex-direction: column; background: var(--bg-dark); border-left: 1px solid #222; }
        @media (max-width: 900px) { .chat-section { flex: 1; min-width: 100%; height: 50%; border-left: none; border-top: 1px solid #222; } }

        .chat-header { background: var(--peake-red); color: white; padding: 12px; text-align: center; font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 12px; font-size: 14px; max-width: 80%; line-height: 1.4; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: var(--peake-red); color: white; }
        .bot-msg { align-self: flex-start; background: #23272e; border: 1px solid #333; color: #ced4da; }

        .input-area { padding: 12px; display: flex; gap: 8px; border-top: 1px solid #222; }
        input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #1a1c20; color: white; outline: none; }
        button { background: var(--peake-red); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Gelişmiş FP Arayüzü */
        .fp-ui { position: absolute; bottom: 20px; left: 20px; display: flex; align-items: flex-end; gap: 10px; pointer-events: none; z-index: 10; }
        .stamina-bar { width: 250px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #555; border-radius: 5px; overflow: hidden; }
        .stamina-fill { height: 100%; width: 100%; background: #a4e61b; transition: width 0.1s; }
        .inventory-slots { display: flex; gap: 5px; }
        .slot { width: 35px; height: 35px; background: rgba(0,0,0,0.3); border: 1px solid #444; border-radius: 3px; display: flex; align-items: center; justify-content: center; color: #888; font-weight: 900; font-size: 20px; }

        /* Nişangah (Crosshair) */
        .crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: rgba(255,255,255,0.7); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; border: 2px solid rgba(0,0,0,0.5); }
        .blocker { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; text-align: center; color: white; }
        .blocker h1 { color: var(--peake-red); margin-bottom: 5px; }
        .blocker p { color: #888; font-size: 14px; margin: 0; }
        .blocker .controls { margin-top: 20px; text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; border: 1px solid #333; font-family: monospace; }
        .blocker .controls div { margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="blocker" id="blocker">
        <h1>PEAKE ULTIMATE 3D</h1>
        <p>BAŞLAMAK İÇİN TIKLA</p>
        <div class="controls">
            <div>[W,A,S,D]: Hareket</div>
            <div>[Q]: Sol Elle Tutun/Bırak</div>
            <div>[E]: Sağ Elle Tutun/Bırak</div>
            <div>[SPACE]: Süper Zıplama</div>
            <div>[MOU]: Bakış</div>
        </div>
    </div>

    <div class="container">
        <div class="game-section">
            <div class="crosshair"></div>
            
            <div class="fp-ui">
                <div class="stamina-bar">
                    <div class="stamina-fill" id="stamina"></div>
                </div>
                <div class="inventory-slots">
                    <div class="slot" style="color: #f55035;">P</div>
                    <div class="slot"></div>
                    <div class="slot"></div>
                </div>
            </div>

            <div id="game-container"></div>
        </div>

        <div class="chat-section">
            <div class="chat-header">PEAKE AI ASCENT TERMINAL</div>
            <div id="messages">Sohbet hazır, dağcı! Tırmanırken bir şeyler sor...</div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Mesajını yaz...">
                <button id="sendBtn">SOR</button>
            </div>
        </div>
    </div>

<script>
    // --- GROQ API BAĞLANTISI ---
    const GROQ_KEY = "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"; 

    async function askGroq() {
        const input = document.getElementById("userInput");
        if(!input.value) return;
        const txt = input.value; input.value = "";
        addMsg(txt, 'user');
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST", headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama3-8b-8192", messages: [{role:"user", content:txt}] })
            });
            const d = await res.json();
            addMsg(d.choices[0].message.content, 'bot');
        } catch(e) { addMsg("Bağlantı hatası!", 'bot'); }
    }
    function addMsg(t, s) {
        const d = document.createElement("div"); d.className = `msg ${s}-msg`; d.innerText = t;
        const m = document.getElementById("messages"); m.appendChild(d); m.scrollTop = m.scrollHeight;
    }
    document.getElementById("sendBtn").onclick = askGroq;
    document.getElementById("userInput").onkeypress = (e) => e.key === "Enter" && askGroq();

    // --- 3D ENGINE (TWO-HANDS FP ASCENT - ULTIMATE) ---
    const container = document.getElementById('game-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xb3e5fc); // Gökyüzü mavis
    scene.fog = new THREE.Fog(0xb3e5fc, 10, 50);

    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // FP Kamera Kontrolleri
    const controls = new THREE.PointerLockControls(camera, container);
    const blocker = document.getElementById('blocker');
    blocker.addEventListener('click', () => controls.lock());
    controls.addEventListener('lock', () => blocker.style.display = 'none');
    controls.addEventListener('unlock', () => blocker.style.display = 'flex');
    scene.add(controls.getObject());

    // Işıklandırma
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const sun = new THREE.DirectionalLight(0xffffff, 0.5); sun.position.set(5, 10, 7); scene.add(sun);

    // Dağ ve Kayalar
    const daGeo = new THREE.ConeGeometry(30, 100, 12);
    const daMat = new THREE.MeshPhongMaterial({ color: 0x8d6e63, flatShading: true });
    const da = new THREE.Mesh(daGeo, daMat);
    da.position.y = -50;
    scene.add(da);

    const holdMaterial = new THREE.MeshPhongMaterial({ color: 0x5d4037, flatShading: true });
    const holds = [];
    for(let i=0; i<60; i++) {
        const holdGeo = new THREE.BoxGeometry(2 + Math.random(), 0.5 + Math.random()*0.5, 2 + Math.random());
        const hold = new THREE.Mesh(holdGeo, holdMaterial);
        hold.position.set(Math.sin(i*0.9)*12, i*3, Math.cos(i*0.9)*12);
        hold.rotation.set(Math.random(), Math.random(), Math.random());
        scene.add(hold);
        holds.push(hold);
    }

    // --- BİRİNCİ ŞAHIS ELLER VE SALLANMA (HEAD BOBBING) ---
    const handGroup = new THREE.Group();
    scene.add(handGroup);

    // Sol El (Pembe) - Gelişmiş Tutunma Bildirimi
    const lHand = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.2, 0.8), 
        new THREE.MeshStandardMaterial({ color: 0xff80ab, roughness: 0.3, metalness: 0.5, emissive: 0x000000, emissiveIntensity: 0 })
    );
    lHand.position.set(-1, -0.8, -1.5); // Kameranın önünde sol alt

    // Sağ El (Mushroom Karakter Rengi)
    const rHand = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.2, 0.8), 
        new THREE.MeshStandardMaterial({ color: 0xffcc80, roughness: 0.3, metalness: 0.5, emissive: 0x000000, emissiveIntensity: 0 })
    );
    rHand.position.set(1, -0.8, -1.5); // Kameranın önünde sağ alt

    handGroup.add(lHand, rHand);
    controls.getObject().add(handGroup); // Eller kamerayı takip etmeli

    // Hareket Değişkenleri
    let yVel = 0, xVel = 0, zVel = 0;
    let stamina = 100;
    let currentScore = 0;
    let grabbedHold = { left: null, right: null }; // Hangi eliyle tutuyor?
    const keys = { w: false, a: false, s: false, d: false, space: false };

    // Tuş Dinleyicileri
    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if(key === ' ') keys.space = true;
        if(keys.hasOwnProperty(key)) keys[key] = true;
    });
    window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        if(key === ' ') keys.space = false;
        if(keys.hasOwnProperty(key)) keys[key] = false;
    });

    // --- GELİŞMİŞ TUTUNMA MANTIĞI & GÖRSEL GERİ BİLDİRİM ---
    function updateHandVisuals() {
        // Sol El Tutunuyor mu?
        if(grabbedHold.left) {
            lHand.material.emissive.setHex(0x00ff00); // Yeşil parıltı
            lHand.material.emissiveIntensity = 0.3;
        } else {
            lHand.material.emissive.setHex(0x000000); // Siyah (kapalı)
            lHand.material.emissiveIntensity = 0;
        }

        // Sağ El Tutunuyor mu?
        if(grabbedHold.right) {
            rHand.material.emissive.setHex(0x00ff00); // Yeşil parıltı
            rHand.material.emissiveIntensity = 0.3;
        } else {
            rHand.material.emissive.setHex(0x000000); // Siyah (kapalı)
            rHand.material.emissiveIntensity = 0;
        }
    }

    function toggleGrab(handType) {
        if(!controls.isLocked) return;

        // Zaten tutunuyorsa, bırak
        if(grabbedHold[handType]) {
            grabbedHold[handType] = null;
            addMsg(`Dağcı: ${handType === 'left' ? 'Sol' : 'Sağ'} elini bıraktı!`, 'user');
            updateHandVisuals();
            return;
        }

        // Tutunmuyorsa, kaya bulmaya çalış
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera({x:0, y:0}, camera); 
        const intersects = raycaster.intersectObjects(holds);

        if(intersects.length > 0 && intersects[0].distance < 3.5) {
            grabbedHold[handType] = intersects[0].object;
            addMsg(`Dağcı: ${handType === 'left' ? 'Sol' : 'Sağ'} eliyle kayaya tutundu!`, 'user');
        } else {
            addMsg(`Dağcı: ${handType === 'left' ? 'Sol' : 'Sağ'} elini boşa attı!`, 'user');
        }
        updateHandVisuals();
    }

    // E ve Q tuşlarına "tutunma/bırakma" olayını bağla
    window.addEventListener('keydown', (e) => {
        if(e.key.toLowerCase() === 'e') toggleGrab('right');
        if(e.key.toLowerCase() === 'q') toggleGrab('left');
    });

    // Head Bobbing Zamanlayıcısı
    let bobTime = 0;

    function animate() {
        requestAnimationFrame(animate);
        
        if(controls.isLocked) {
            const isGrabbing = grabbedHold.left || grabbedHold.right;
            bobTime += 0.05; // Head bobbing zamanını ilerlet

            // Fizik ve Yerçekimi
            if(!isGrabbing) {
                // Tutunmuyorsa düşer, süper zıplama hakkı var
                if(keys.space && yVel === 0) yVel = 0.3; 
                yVel -= 0.012;
            } else {
                // Tutunuyorsa yerçekimini hissetmez
                yVel = 0;
                stamina -= 0.08; // Tutunmak enerji harcar
            }

            // Stamina Kontrolü
            if(stamina < 0) {
                stamina = 0;
                if(isGrabbing) {
                    addMsg(`Peake AI: Enerjin bitti, tutuşun koptu!`, 'groq');
                    grabbedHold.left = null; grabbedHold.right = null;
                    updateHandVisuals();
                }
            } else if(!isGrabbing && stamina < 100) {
                stamina += 0.15; // Yerdeyken veya zıplarken enerji dolar
            }
            document.getElementById('stamina').style.width = stamina + '%';

            // Eller Tutunurken Hareket
            if(isGrabbing) {
                // Peak tarzı hata affetmeyen mekanik
                if(keys.w) yVel = 0.09;
                if(keys.s) yVel = -0.09;
                if(keys.a) controls.moveRight(-0.09);
                if(keys.d) controls.moveRight(0.09);
                // Sallanma Kontrolü
                handGroup.position.y = Math.sin(bobTime * 2) * 0.02; // Hafif yukarı-aşağı sallanma
            } else {
                // Havada hareket (süper zıplama ile)
                if(keys.a) controls.moveRight(-0.04);
                if(keys.d) controls.moveRight(0.04);
                // Sallanma Kontrolü
                handGroup.position.y = 0; // Havada sallanma yok
            }

            // Hareket Uygula
            controls.getObject().position.y += yV;

            // Platform Çarpışma Kontrolü (Ayaklar için en alttakiler)
            if(!isGrabbing && yVel < 0) {
                holds.forEach((p, idx) => {
                    const pos = controls.getObject().position;
                    if(pos.y > p.position.y && pos.y < p.position.y + 1.2 &&
                       Math.abs(pos.x - p.position.x) < 1.8 && Math.abs(pos.z - p.position.z) < 1.8) {
                        yVel = 0; 
                    }
                });
            }

            // Düşme kontrolü (Sıfırla)
            if(controls.getObject().position.y < -10) {
                controls.getObject().position.set(0, 5, 0);
                yVel = 0;
                grabbedHold.left = null; grabbedHold.right = null;
                updateHandVisuals();
                addMsg(`Peake AI: Dağdan düştün! Tekrar dene.`, 'groq');
            }
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        if (!container.clientWidth) return;
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    animate();
</script>
</body>
</html>
