<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Peake Hub - Oyun ve Sohbet</title>
    <style>
        /* Tasarım Ayarları */
        body { 
            margin: 0; 
            background: #121212; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
        }

        /* Sol Taraf: Oyun Alanı */
        .game-section {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 2px solid #333;
        }

        canvas { 
            background: #1e1e1e; 
            border: 3px solid #1a73e8; 
            border-radius: 10px; 
            box-shadow: 0 0 20px rgba(26, 115, 232, 0.3);
            cursor: pointer;
        }

        /* Sağ Taraf: Sohbet Alanı */
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #181818;
        }

        .chat-header { background: #1a73e8; padding: 15px; text-align: center; font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #333; padding: 8px 12px; border-radius: 10px; font-size: 14px; max-width: 85%; }
        .input-area { padding: 15px; display: flex; gap: 5px; border-top: 1px solid #333; }
        input { flex: 1; padding: 8px; border-radius: 5px; border: none; outline: none; }
        button { background: #1a73e8; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        .stats { font-size: 24px; margin-bottom: 10px; color: #1a73e8; font-weight: bold; }
    </style>
</head>
<body>

    <div class="game-section">
        <div class="stats">Skor: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="600" height="350"></canvas>
        <p style="color: #666; margin-top: 10px;">Zıplamak için ekrana tıkla!</p>
    </div>

    <div class="chat-section">
        <div class="chat-header">🚀 PEAKE CHAT</div>
        <div id="messages">Sohbet yükleniyor...</div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Mesajın...">
            <button onclick="askGemini()">Sor</button>
        </div>
    </div>

<script type="module">
    // --- GEMINI AYARLARI ---
    const API_KEY = "BURAYA_KENDI_API_ANAHTARINI_YAZ";

    window.askGemini = async function() {
        const input = document.getElementById("userInput");
        const prompt = input.value;
        if (!prompt) return;

        addMessage(prompt, 'user');
        input.value = "";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            addMessage(data.candidates[0].content.parts[0].text, 'gemini');
        } catch (e) { addMessage("Hata oluştu!", 'gemini'); }
    };

    function addMessage(text, sender) {
        const msgDiv = document.getElementById("messages");
        if(msgDiv.innerText === "Sohbet yükleniyor...") msgDiv.innerText = "";
        const div = document.createElement("div");
        div.className = "msg";
        div.style.alignSelf = sender === 'user' ? 'flex-end' : 'flex-start';
        div.style.background = sender === 'user' ? '#1a73e8' : '#333';
        div.innerText = text;
        msgDiv.appendChild(div);
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    // --- OYUN MANTIĞI ---
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let score = 0, gameActive = true, frame = 0;
    let player = { x: 50, y: 250, w: 35, h: 35, dy: 0, jump: -10, gravity: 0.5, grounded: false };
    let obstacles = [];

    function loop() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Yerçekimi
        player.dy += player.gravity; player.y += player.dy;
        if (player.y + player.h > canvas.height) { player.y = canvas.height - player.h; player.dy = 0; player.grounded = true; }

        // Oyuncu Çizimi
        ctx.fillStyle = "#1a73e8";
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // Engeller
        frame++;
        if (frame % 90 === 0) obstacles.push({ x: canvas.width, y: 300, w: 25, h: 50 });
        
        obstacles.forEach((obs, i) => {
            obs.x -= 5;
            ctx.fillStyle = "#ff4757";
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

            // Çarpışma Kontrolü
            if (player.x < obs.x + obs.w && player.x + player.w > obs.x && player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                gameActive = false;
                alert("Yandın! Skorun: " + score);
                location.reload();
            }
            if (obs.x + obs.w < 0) { obstacles.splice(i, 1); score++; document.getElementById("score").innerText = score; }
        });
        requestAnimationFrame(loop);
    }

    canvas.addEventListener("mousedown", () => { if (player.grounded) { player.dy = player.jump; player.grounded = false; } });
    loop();
</script>

</body>
</html>
