<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peake 3D - Dağ Fethi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: 'Montserrat', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .container { display: flex; width: 100%; height: 100%; }
        @media (max-width: 900px) { .container { flex-direction: column; } }

        /* Oyun Bölümü */
        .game-section { flex: 2; position: relative; border-right: 1px solid #333; }
        @media (max-width: 900px) { .game-section { flex: 1.2; border-right: none; border-bottom: 1px solid #333; } }
        #game-container { width: 100%; height: 100%; cursor: pointer; }

        /* Sohbet Bölümü */
        .chat-section { flex: 1; display: flex; flex-direction: column; background: #0f0f0f; min-width: 350px; }
        @media (max-width: 900px) { .chat-section { flex: 1; min-width: 100%; height: 50%; } }

        .chat-header { background: #f55035; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px; border-radius: 12px; font-size: 14px; max-width: 85%; line-height: 1.5; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .user-msg { align-self: flex-end; background: #f55035; color: white; border-bottom-right-radius: 2px; }
        .groq-msg { align-self: flex-start; background: #1a1a1a; color: #ddd; border: 1px solid #333; border-bottom-left-radius: 2px; }

        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; outline: none; }
        button { background: #f55035; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #d04028; }

        /* Oyun Arayüzü */
        .ui { position: absolute; top: 20px; left: 20px; font-size: 26px; color: #f55035; font-weight: bold; pointer-events: none; }
        
        /* Kontroller */
        .controls { position: absolute; bottom: 30px; left: 0; right: 0; display: none; justify-content: space-around; padding: 0 20px; pointer-events: none; }
        @media (max-width: 900px) { .controls { display: flex; } }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.05); border: 2px solid #f55035; border-radius: 50%; color: white; font-size: 24px; display: flex; align-items: center; justify-content: center; pointer-events: auto; user-select: none; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div class="container">
        <div class="game-section">
            <div class="ui">PEAKE ASCENT: <span id="height">0</span></div>
            <div id="game-container"></div>
            
            <div class="controls">
                <div class="btn" id="lBtn">←</div>
                <div class="btn" id="rBtn">→</div>
            </div>
        </div>

        <div class="chat-section">
            <div class="chat-header">PEAKE AI HUD</div>
            <div id="messages">Sohbet hazır! Peake hakkında ne bilmek istersin?</div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Hızlıca bir şey sor...">
                <button id="sendBtn">SOR</button>
            </div>
        </div>
    </div>

<script>
    // --- GROQ SOHBET ---
    const GROQ_KEY = "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";

    async function chat() {
        const input = document.getElementById("userInput");
        if(!input.value) return;
        const prompt = input.value; input.value = "";
        addMsg(prompt, 'user');

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama3-8b-8192", messages: [{role:"user", content:prompt}] })
            });
            const data = await response.json();
            addMsg(data.choices[0].message.content, 'groq');
        } catch(e) { addMsg("Hata: Groq anahtarını kontrol et.", 'groq'); }
    }

    function addMsg(text, type) {
        const d = document.createElement("div");
        d.className = `msg ${type}-msg`; d.innerText = text;
        const m = document.getElementById("messages");
        m.appendChild(d); m.scrollTop = m.scrollHeight;
    }

    document.getElementById("sendBtn").onclick = chat;
    document.getElementById("userInput").addEventListener("keypress", (e) => { if (e.key === "Enter") chat(); });

    // --- 3D OYUN MANTIĞI (PEAKE-STYLE TIRMANTIŞ) ---
    const container = document.getElementById('game-container');
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x121212, 10, 30); // Derinlik için sis

    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const light = new THREE.DirectionalLight(0xffffff, 0.5); light.position.set(5, 10, 7); scene.add(light);

    // --- ŞIK LOW-POLY KARAKTER ---
    const characterGroup = new THREE.Group();
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), new THREE.MeshPhongMaterial({ color: 0xffffff, flatShading: true }));
    head.position.y = 1.3;
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.2, 0.9), new THREE.MeshPhongMaterial({ color: 0xf55035, flatShading: true }));
    torso.position.y = 0.6;
    const backpack = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 0.25), new THREE.MeshPhongMaterial({ color: 0x333333, flatShading: true }));
    backpack.position.set(0, 0.7, -0.3);

    characterGroup.add(head, torso, backpack);
    scene.add(characterGroup);

    // --- KAYALIK DAĞ VE PLATFORMLAR ---
    const mountainGeo = new THREE.ConeGeometry(8, 40, 10);
    const mountainMat = new THREE.MeshPhongMaterial({ color: 0x222222, flatShading: true });
    const mountain = new THREE.Mesh(mountainGeo, mountainMat);
    mountain.position.y = -5;
    scene.add(mountain);

    const platforms = [];
    const platformMaterial = new THREE.MeshPhongMaterial({ color: 0x444444, flatShading: true });
    for(let i=0; i<30; i++) {
        const p = new THREE.Mesh(new THREE.BoxGeometry(2 + Math.random(), 0.3, 2 + Math.random()), platformMaterial);
        p.position.set(Math.sin(i*0.8)*4, i*2.5, Math.cos(i*0.8)*2); 
        scene.add(p);
        platforms.push(p);
    }

    let yV = 0, xV = 0, score = 0, currentPlatformIndex = 0;
    camera.position.set(0, 5, 12);

    function animate() {
        requestAnimationFrame(animate);
        
        yV -= 0.012; // Yerçekimi
        characterGroup.position.y += yV;
        characterGroup.position.x += xV;
        xV *= 0.9; // Yumuşak duruş

        // Peake-Style Tırmanış (Tutunma Mantığı)
        platforms.forEach((p, index) => {
            // Eğer karakter platformun hemen üzerindeyse ve düşüyorsa
            if (characterGroup.position.y > p.position.y && characterGroup.position.y < p.position.y + 0.6 &&
                Math.abs(characterGroup.position.x - p.position.x) < 1.5 && yV < 0) {
                
                yV = 0.22; // Tutundu ve yukarı çekti!
                if (index > currentPlatformIndex) {
                    currentPlatformIndex = index;
                    score = index * 100;
                    document.getElementById('height').innerText = score;
                }
            }
        });

        // Kamera Takibi
        camera.position.lerp(new THREE.Vector3(characterGroup.position.x, characterGroup.position.y + 3, 11), 0.1);
        camera.lookAt(characterGroup.position.x, characterGroup.position.y, 0);

        if(characterGroup.position.y < -15) { characterGroup.position.set(0,2,0); yV = 0; score = 0; }
        renderer.render(scene, camera);
    }

    // --- HİBRİT KONTROLLER ---
    // Masaüstü: Fare
    window.addEventListener('mousemove', (e) => {
        if(window.innerWidth > 900) {
            xV = ((e.clientX / window.innerWidth) - 0.5) * 0.3;
        }
    });

    // Mobil: Butonlar
    const lBtn = document.getElementById('lBtn'); const rBtn = document.getElementById('rBtn');
    lBtn.ontouchstart = () => xV = -0.18; rBtn.ontouchstart = () => xV = 0.18;
    lBtn.ontouchend = rBtn.ontouchend = () => xV *= 0.5;

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    animate();
</script>
</body>
</html>
