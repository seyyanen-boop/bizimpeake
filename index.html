<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Peake - Ultimate Ascent Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --peake-red: #f55035; --bg-dark: #0d0f12; }
        body { margin: 0; background: var(--bg-dark); color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .container { display: flex; width: 100%; height: 100%; }

        /* Oyun Bölümü */
        .game-section { flex: 2.5; position: relative; background: #1a1c20; cursor: crosshair; }
        #game-container { width: 100%; height: 100%; outline: none; }

        /* Sohbet Bölümü */
        .chat-section { flex: 1; display: flex; flex-direction: column; background: var(--bg-dark); border-left: 1px solid #333; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 85%; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: var(--peake-red); color: white; }
        .bot-msg { align-self: flex-start; background: #23272e; border: 1px solid #444; }
        .input-area { padding: 10px; display: flex; gap: 5px; border-top: 1px solid #333; }
        input { flex: 1; padding: 10px; background: #1a1c20; border: 1px solid #444; color: white; border-radius: 5px; }

        /* Peak UI (Görseldeki gibi) */
        .ui-overlay { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .stamina-container { width: 300px; height: 12px; background: rgba(0,0,0,0.6); border: 2px solid #444; border-radius: 4px; position: relative; }
        #stamina-fill { height: 100%; width: 100%; background: #a4e61b; transition: width 0.2s, background 0.3s; }
        .weight-info { font-size: 12px; color: #aaa; margin-top: 5px; font-weight: bold; }
        
        .inventory { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        .slot { width: 50px; height: 50px; background: rgba(0,0,0,0.5); border: 2px solid #555; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .slot.active { border-color: var(--peake-red); background: rgba(245, 80, 53, 0.2); }

        .blocker { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .btn-start { padding: 15px 40px; background: var(--peake-red); color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="blocker" id="blocker">
        <h1 style="color:var(--peake-red); letter-spacing: 5px;">PEAKE</h1>
        <p style="color:#777;">ZİRVEYE ULAŞMAK İÇİN HER ŞEYİNİ VER</p>
        <button class="btn-start" onclick="initGame()">TIRMANIŞA BAŞLA</button>
        <p style="font-size: 12px; margin-top: 20px; color:#555;">[WASD]: Hareket | [MOUSE]: Bakış | [SHIFT]: Koşma | [1-2-3]: Envanter</p>
    </div>

    <div class="container">
        <div class="game-section">
            <div class="ui-overlay">
                <div class="stamina-container"><div id="stamina-fill"></div></div>
                <div class="weight-info">YÜK: <span id="weight-val">2.4</span>kg / 10kg</div>
            </div>
            
            <div class="inventory">
                <div class="slot active" id="slot-1">🧗</div>
                <div class="slot" id="slot-2">🧭</div>
                <div class="slot" id="slot-3">🔦</div>
            </div>

            <div id="game-container"></div>
        </div>

        <div class="chat-section">
            <div style="padding:10px; background:#f55035; font-size:10px; font-weight:900; text-align:center;">AI EXPEDITION LOG</div>
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Telsizle konuş..." autocomplete="off">
                <button onclick="askGroq()" style="background:var(--peake-red); color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">GÖNDER</button>
            </div>
        </div>
    </div>

<script>
    // --- GLOBAL VARIABLES ---
    let stamina = 100, weight = 2.4, isRunning = false, isGrounded = true;
    let fogDensity = 0.02, isLocked = false;
    const GROQ_KEY = "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";

    // --- 3D SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xcedce0);
    scene.fog = new THREE.FogExp2(0xcedce0, fogDensity);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth*0.7 / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    const container = document.getElementById('game-container');
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // Işıklandırma (Low-poly için sert gölgeler)
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(50, 100, 50);
    scene.add(sun);

    // DAĞ OLUŞTURMA (Low-Poly Karmaşık Yapı)
    const mountainMat = new THREE.MeshStandardMaterial({ color: 0x7b8d8e, flatShading: true });
    const snowMat = new THREE.MeshStandardMaterial({ color: 0xffffff, flatShading: true });

    function createMountain() {
        const group = new THREE.Group();
        for(let i=0; i<80; i++) {
            const size = Math.random() * 5 + 2;
            const geo = new THREE.BoxGeometry(size, size * 0.4, size);
            const rock = new THREE.Mesh(geo, i > 60 ? snowMat : mountainMat);
            
            // Sarmal yol yapısı
            const angle = i * 0.5;
            const radius = 15 - (i * 0.15);
            rock.position.set(Math.cos(angle) * radius, i * 1.5, Math.sin(angle) * radius);
            rock.rotation.set(Math.random(), Math.random(), Math.random());
            group.add(rock);
        }
        scene.add(group);
        return group;
    }
    const mountain = createMountain();

    // KARAKTER ELLERİ
    const hands = new THREE.Group();
    const lHand = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.6), new THREE.MeshStandardMaterial({ color: 0xff80ab }));
    const rHand = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.6), new THREE.MeshStandardMaterial({ color: 0xffcc80 }));
    lHand.position.set(-0.7, -0.5, -1);
    rHand.position.set(0.7, -0.5, -1);
    hands.add(lHand, rHand);
    camera.add(hands);
    scene.add(camera);

    camera.position.set(15, 2, 15);
    camera.lookAt(0, 0, 0);

    // --- MEKANİKLER ---
    const keys = {};
    window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; if(e.key === 'Shift') isRunning = true; };
    window.onkeyup = (e) => { keys[e.key.toLowerCase()] = false; if(e.key === 'Shift') isRunning = false; };

    function initGame() {
        document.getElementById('blocker').style.display = 'none';
        isLocked = true;
        addMsg("Sistem: Zirveye 400 metre kaldı. Dikkatli ol.", 'bot');
    }

    function animate() {
        requestAnimationFrame(animate);
        if(!isLocked) return;

        // 1. Hareket ve Stamina İlişkisi
        let speed = isRunning ? 0.15 : 0.07;
        let staminaDrain = (weight * 0.01); // Ağırlık arttıkça enerji daha hızlı gider

        if(keys['w']) {
            camera.position.y += speed;
            stamina -= isRunning ? staminaDrain * 3 : staminaDrain;
            // El sallanması
            hands.position.y = Math.sin(Date.now() * 0.01) * 0.05;
        }
        if(keys['s']) camera.position.y -= speed;

        // 2. Dinamik Sis ve Hava Durumu
        // Yükseldikçe sis artar (Video 2'deki gibi)
        fogDensity = 0.01 + (camera.position.y * 0.001);
        scene.fog.density = fogDensity;

        // 3. Stamina Yönetimi
        if(stamina < 0) {
            stamina = 0;
            camera.position.y -= 0.1; // Enerji biterse aşağı kayar
        } else if(!keys['w'] && stamina < 100) {
            stamina += 0.1; // Dinlenirken dolar
        }

        // UI Güncelleme
        const sFill = document.getElementById('stamina-fill');
        sFill.style.width = stamina + "%";
        if(stamina < 20) sFill.style.background = "#f55035";
        else sFill.style.background = "#a4e61b";

        renderer.render(scene, camera);
    }
    animate();

    // --- AI SOHBET ---
    async function askGroq() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if(!text) return;
        addMsg(text, 'user');
        input.value = "";
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role: "system", content: "Sen bir dağ tırmanış rehberisin. Peak oyunundaki gibi telsizden kısa ve öz konuş."}, {role: "user", content: text}] })
            });
            const data = await res.json();
            addMsg(data.choices[0].message.content, 'bot');
        } catch(e) { addMsg("Cızırtı... Bağlantı kesiliyor...", 'bot'); }
    }
    function addMsg(t, s) {
        const d = document.createElement("div"); d.className = `msg ${s}-msg`; d.innerText = t;
        const m = document.getElementById("messages"); m.appendChild(d); m.scrollTop = m.scrollHeight;
    }
</script>
</body>
</html>
