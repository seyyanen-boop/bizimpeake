<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Peake 3D - Groq Hızıyla</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .game-section { flex: 2; position: relative; border-right: 1px solid #333; }
        .chat-section { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; }
        #game-container { width: 100%; height: 100%; cursor: none; }
        .chat-header { background: #f55035; color: white; padding: 15px; text-align: center; font-weight: bold; letter-spacing: 1px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 12px; font-size: 14px; max-width: 80%; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: #f55035; color: white; }
        .groq-msg { align-self: flex-start; background: #222; color: #eee; border: 1px solid #444; }
        .input-area { padding: 15px; display: flex; gap: 8px; border-top: 1px solid #222; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; outline: none; }
        button { background: #f55035; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .ui { position: absolute; top: 20px; left: 20px; font-size: 28px; color: #f55035; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

    <div class="game-section">
        <div class="ui">YÜKSEKLİK: <span id="height">0</span>m</div>
        <div id="game-container"></div>
    </div>

    <div class="chat-section">
        <div class="chat-header">PEAKE AI (GROQ POWERED)</div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Hızlıca bir şey sor...">
            <button id="sendBtn">GÖNDER</button>
        </div>
    </div>

<script>
    // --- GROQ AYARLARI ---
    const GROQ_API_KEY = "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"; 

    const msgDiv = document.getElementById("messages");

    function addMessage(text, type) {
        const div = document.createElement("div");
        div.className = `msg ${type}-msg`;
        div.innerText = text;
        msgDiv.appendChild(div);
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    async function askGroq() {
        const input = document.getElementById("userInput");
        const prompt = input.value;
        if (!prompt) return;

        addMessage(prompt, 'user');
        input.value = "";

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama3-8b-8192", // Groq'un en hızlı modellerinden biri
                    messages: [{ role: "user", content: prompt }]
                })
            });

            const data = await response.json();
            const aiResponse = data.choices[0].message.content;
            addMessage(aiResponse, 'groq');
        } catch (e) {
            addMessage("Hata: Groq anahtarını kontrol et!", 'groq');
            console.error(e);
        }
    }

    document.getElementById("sendBtn").onclick = askGroq;
    document.getElementById("userInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") askGroq();
    });

    // --- 3D OYUN (THREE.JS) ---
    const container = document.getElementById('game-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const player = new THREE.Mesh(new THREE.SphereGeometry(0.6, 32, 32), new THREE.MeshPhongMaterial({ color: 0xf55035 }));
    scene.add(player);

    let yVel = 0, score = 0;
    const platforms = [];
    for(let i=0; i<20; i++) {
        const p = new THREE.Mesh(new THREE.BoxGeometry(3, 0.4, 3), new THREE.MeshPhongMaterial({ color: 0x333333 }));
        p.position.set((Math.random()-0.5)*12, i*4, (Math.random()-0.5)*12);
        scene.add(p);
        platforms.push(p);
    }

    camera.position.z = 10;

    function animate() {
        requestAnimationFrame(animate);
        yVel -= 0.012; 
        player.position.y += yVel;

        platforms.forEach(p => {
            if (player.position.y > p.position.y && player.position.y < p.position.y + 0.5 &&
                Math.abs(player.position.x - p.position.x) < 1.8 &&
                Math.abs(player.position.z - p.position.z) < 1.8 && yVel < 0) {
                yVel = 0.28; 
                score = Math.max(score, Math.floor(p.position.y));
                document.getElementById('height').innerText = score;
            }
        });

        camera.position.y = player.position.y + 3;
        camera.lookAt(player.position.x, player.position.y, 0);

        if (player.position.y < -10) { player.position.set(0,2,0); yVel = 0; }
        renderer.render(scene, camera);
    }

    container.addEventListener('mousemove', (e) => {
        const rect = container.getBoundingClientRect();
        player.position.x = (((e.clientX - rect.left) / container.clientWidth) * 2 - 1) * 8;
        player.position.z = (((e.clientY - rect.top) / container.clientHeight) * 2 - 1) * 5;
    });

    animate();
</script>
</body>
</html>
