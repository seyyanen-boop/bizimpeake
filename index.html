<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peake - Final Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #0d0f12; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .container { display: flex; width: 100%; height: 100%; }
        .game-section { flex: 2; position: relative; background: #15171b; }
        #game-container { width: 100%; height: 100%; }
        .chat-section { flex: 1; display: flex; flex-direction: column; background: #0d0f12; border-left: 1px solid #222; }
        .chat-header { background: #f55035; padding: 12px; text-align: center; font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; font-size: 14px; max-width: 80%; }
        .user-msg { align-self: flex-end; background: #f55035; }
        .bot-msg { align-self: flex-start; background: #23272e; border: 1px solid #333; }
        .input-area { padding: 10px; display: flex; gap: 5px; border-top: 1px solid #222; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #1a1c20; color: white; outline: none; }
        button { background: #f55035; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        .score-ui { position: absolute; top: 20px; left: 20px; font-size: 30px; font-weight: bold; color: #f55035; }
    </style>
</head>
<body>

<div class="container">
    <div class="game-section">
        <div class="score-ui" id="score">0</div>
        <div id="game-container"></div>
    </div>
    <div class="chat-section">
        <div class="chat-header">PEAKE CHAT</div>
        <div id="messages">Sohbet hazır!</div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Mesaj yaz...">
            <button onclick="askGroq()">Sor</button>
        </div>
    </div>
</div>

<script>
    // --- GROQ AYARI ---
    const GROQ_KEY = "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"; // Ekran görüntündeki anahtar

    async function askGroq() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if(!text) return;

        addMessage(text, 'user');
        input.value = "";

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama3-8b-8192",
                    messages: [{role: "user", content: text}]
                })
            });
            const data = await res.json();
            if(data.choices) addMessage(data.choices[0].message.content, 'bot');
            else addMessage("Hata: " + (data.error ? data.error.message : "Bilinmiyor"), 'bot');
        } catch (e) {
            addMessage("Bağlantı hatası!", 'bot');
        }
    }

    function addMessage(txt, type) {
        const div = document.createElement("div");
        div.className = `msg ${type}-msg`;
        div.innerText = txt;
        const m = document.getElementById("messages");
        m.appendChild(div);
        m.scrollTop = m.scrollHeight;
    }

    // --- 3D OYUN ---
    const container = document.getElementById('game-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 5);
    scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

    // Karakter
    const player = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.2), new THREE.MeshStandardMaterial({color: 0xf55035}));
    player.position.y = 2;
    scene.add(player);

    // Platformlar
    const platforms = [];
    for(let i=0; i<50; i++) {
        const p = new THREE.Mesh(new THREE.BoxGeometry(3, 0.3, 2), new THREE.MeshStandardMaterial({color: 0x333}));
        p.position.set(Math.sin(i)*5, i*3.5, 0);
        scene.add(p);
        platforms.push(p);
    }

    let yV = 0, xV = 0, score = 0;
    const keys = {};
    window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
    window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

    function animate() {
        requestAnimationFrame(animate);
        yV -= 0.01; player.position.y += yV;
        if(keys['a']) xV = -0.15; else if(keys['d']) xV = 0.15; else xV *= 0.9;
        player.position.x += xV;

        platforms.forEach((p, i) => {
            if(yV < 0 && Math.abs(player.position.x - p.position.x) < 1.5 && Math.abs(player.position.y - p.position.y) < 0.5) {
                yV = keys[' '] ? 0.4 : 0.25;
                score = Math.max(score, i * 10);
                document.getElementById('score').innerText = score;
            }
        });

        camera.position.set(0, player.position.y + 3, 10);
        camera.lookAt(0, player.position.y, 0);
        if(player.position.y < -10) { player.position.set(0, 5, 0); yV = 0; }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
