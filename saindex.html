<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizim Peake - Paylaşım Duvarı</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        #messages { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; display: flex; flex-direction: column; }
        .msg { background: #e1f5fe; padding: 8px; margin: 5px 0; border-radius: 5px; font-size: 14px; }
        .msg b { color: #0277bd; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #2ecc71; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Bizim Peake</h2>
    <div id="messages">Sohbet yükleniyor...</div>
    <input type="text" id="username" placeholder="Adın nedir?">
    <input type="text" id="messageInput" placeholder="Bir şeyler paylaş...">
    <button onclick="sendMessage()">Paylaş</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // DİKKAT: Burası standart bir kurulumdur. 
  // Gerçek bir proje için kendi Firebase "config" bilgilerini buraya koyman gerekecek.
  const firebaseConfig = {
    databaseURL: "https://tuerkce-test-default-rtdb.firebaseio.com/" 
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, 'posts');

  // Mesaj Gönderme
  window.sendMessage = function() {
    const user = document.getElementById("username").value || "Anonim";
    const text = document.getElementById("messageInput").value;
    if(text) {
        push(messagesRef, { user: user, text: text });
        document.getElementById("messageInput").value = "";
    }
  };

  // Mesajları Canlı Alıp Ekrana Yazma
  const msgDiv = document.getElementById("messages");
  msgDiv.innerHTML = ""; // Yükleniyor yazısını sil
  onChildAdded(messagesRef, (data) => {
    const m = data.val();
    const el = document.createElement("div");
    el.className = "msg";
    el.innerHTML = `<b>${m.user}:</b> ${m.text}`;
    msgDiv.appendChild(el);
    msgDiv.scrollTop = msgDiv.scrollHeight; // En alta kaydır
  });
</script>

</body>
</html>
